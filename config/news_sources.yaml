# AI Radar — News Sources Registry
# Each source has: id, name, url, feed_url, language, source_type, enabled, priority, tags

sources:
  # === International ===
  - id: openai_blog
    name: OpenAI Blog
    url: https://openai.com/blog
    feed_url: https://openai.com/blog/rss.xml
    language: en
    source_type: rss
    enabled: true
    priority: 1
    tags: [official, model_release, api]

  - id: anthropic_news
    name: Anthropic News
    url: https://www.anthropic.com/news
    feed_url: https://www.anthropic.com/rss.xml
    language: en
    source_type: rss
    enabled: true
    priority: 1
    tags: [official, model_release, safety]

  - id: google_ai_blog
    name: Google AI Blog
    url: https://blog.google/technology/ai/
    feed_url: https://blog.google/technology/ai/rss/
    language: en
    source_type: rss
    enabled: true
    priority: 1
    tags: [official, model_release, research]

  - id: huggingface_blog
    name: Hugging Face Blog
    url: https://huggingface.co/blog
    feed_url: https://huggingface.co/blog/feed.xml
    language: en
    source_type: rss
    enabled: true
    priority: 1
    tags: [open_source, models, tools]

  - id: arxiv_cs_ai
