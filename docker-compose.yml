version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ai_radar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar_db}
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-off: applies Alembic migrations and seeds config/news_sources.yaml
  # before app/scheduler are allowed to start.
  migrate:
    build: .
    container_name: ai_radar_migrate
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ai_radar_db}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: sh -c "alembic upgrade head && python scripts/seed_sources.py"
    restart: "no"

  app:
    build: .
    container_name: ai_radar_app
    restart: always
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ai_radar_db}
      - LLM_BASE_URL=http://host.docker.internal:20128/v1
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app

  # Runs the collect -> normalize -> analyze -> validate -> moderate pipeline
  # on a loop (SCHEDULER_INTERVAL_MINUTES) so the bot actually produces
  # content without any manual script invocation.
  scheduler:
    build: .
    container_name: ai_radar_scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ai_radar_db}
      - LLM_BASE_URL=http://host.docker.internal:20128/v1
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - .:/app
    command: python scripts/run_scheduler.py --daemon

volumes:
  postgres_data:
